version: 2

models:
  - name: stg_stock_prices
    description: Staging stock price model from raw_market.stock_prices.
    columns:
      - name: date
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: close
        tests:
          - not_null

  - name: stg_factor_prices
    description: Staging factor price model from raw_market.factor_prices.
    columns:
      - name: date
        tests:
          - not_null
      - name: factor_name
        tests:
          - not_null
      - name: factor_value
        tests:
          - not_null

  - name: stg_asset_returns
    description: Cleaned asset returns from processed_market.asset_returns for downstream portfolio models.
    columns:
      - name: date
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: log_return
        tests:
          - not_null

  - name: int_asset_returns
    description: Intermediate daily log returns model.
    columns:
      - name: ticker
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: int_portfolio_metrics
    description: Intermediate weighted portfolio return series and summary metrics.
    columns:
      - name: date
        tests:
          - not_null
      - name: portfolio_return
        tests:
          - not_null
      - name: portfolio_volatility
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
      - name: weighted_sharpe
        tests:
          - not_null

  - name: mart_stock_metrics
    description: Annualized stock-level return, volatility and Sharpe ratio.
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: observations
        tests:
          - not_null

  - name: mart_portfolio_scenarios
    description: Portfolio return time series and summary metrics.
    columns:
      - name: portfolio_id
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: portfolio_return
        tests:
          - not_null
      - name: portfolio_volatility
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
      - name: weighted_sharpe
        tests:
          - not_null

  - name: mart_monte_carlo_summary
    description: Serving-layer Monte Carlo summary enriched with portfolio context.
    columns:
      - name: portfolio_id
        tests:
          - not_null
      - name: run_id
        tests:
          - not_null
      - name: probability_of_loss
        tests:
          - not_null
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: var_95
        tests:
          - not_null
      - name: cvar_95
        tests:
          - not_null
